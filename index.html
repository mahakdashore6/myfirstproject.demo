<!DOCTYPE html>
<html>
<head>
<title>Trip Planner</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center/cover;
    height: 100vh;
    overflow: hidden;
}

/* Dark overlay for better visibility */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
}

/* Center box */
.container {
    position: relative;
    top: 50%;
    transform: translateY(-50%);
    text-align: center;
    color: white;
}

/* Typing effect */
.typing {
    font-size: 50px;
    border-right: 3px solid white;
    white-space: nowrap;
    overflow: hidden;
    width: 0;
    animation: typing 3s steps(30, end) forwards, blink 0.7s infinite;
}

/* Second line */
.second {
    font-size: 35px;
    margin-top: 10px;
    opacity: 0;
    animation: fadeInUp 2s ease-in-out 3s forwards;
}

/* Animations */
@keyframes typing {
    from { width: 0 }
    to { width: 100% }
}

@keyframes blink {
    50% { border-color: transparent }
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Floating effect */
.container {
    animation: float 4s ease-in-out infinite;
}

@keyframes float {
    0%,100% { transform: translateY(-50%) }
    50% { transform: translateY(-60%) }
}

/* Button */
button {
    margin-top: 25px;
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    color: white;
    cursor: pointer;

    animation: pulse 2s infinite;
}

button:hover {
    transform: scale(1.1);
}

/* Pulse effect */
@keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(0,114,255,0.7); }
    70% { box-shadow: 0 0 20px 20px rgba(0,114,255,0); }
    100% { box-shadow: 0 0 0 0 rgba(0,114,255,0); }
}

/* Subtitle */
p {
    margin-top: 10px;
    font-size: 18px;
    opacity: 0;
    animation: fadeInUp 2s ease-in-out 4s forwards;
}
</style>

</head>

<body>

<div class="overlay"></div>

<div class="container">
    <div class="typing">🌍 Explore the World</div>
    <div class="second">with Trip Planner ✈️</div>

    <p>Your journey starts here... plan smart, travel happy 😊</p>

    <button onclick="start()">Plan Your Trip</button>
</div>

<script>
function start() {
    window.location.href = "trip.html";
}
</script>

</body>
</html>
